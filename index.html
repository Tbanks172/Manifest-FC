<!DOCTYPE html>

<html>
<head>

<title>Manifest FC</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{background:#06060A !important;background-color:#06060A !important;height:100%}
body{background:#06060A !important;background-color:#06060A !important;color:#F0EEE8;font-family:Inter,sans-serif;height:100%;overflow:hidden;-webkit-font-smoothing:antialiased}
#app{position:fixed;inset:0;background:#06060A;background-color:#06060A;max-width:430px;margin:0 auto;overflow:hidden;display:flex;flex-direction:column}
.screen{position:absolute;inset:0;background:#06060A;background-color:#06060A;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity 0.35s ease;overflow:hidden}
.screen.active{opacity:1;pointer-events:all}
.scroll-area{flex:1;overflow-y:auto;background:#06060A;background-color:#06060A;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{display:none}
.home-glow{position:absolute;top:-120px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(201,168,76,0.09) 0%,transparent 65%);pointer-events:none;z-index:0}
.home-inner{position:relative;z-index:1;display:flex;flex-direction:column;height:100%;background:#06060A}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:52px 24px 0}
.logo-mark{display:flex;flex-direction:column;gap:2px}
.logo-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:900;color:#fff;letter-spacing:-0.5px;line-height:1}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:5px;color:#C9A84C;text-transform:uppercase}
.lang-pill{display:flex;align-items:center;gap:7px;padding:8px 16px;border-radius:40px;border:1px solid rgba(201,168,76,0.3);background:rgba(201,168,76,0.06);color:#C9A84C;font-size:12px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.daily-banner{margin:32px 24px 0;padding:28px 28px 32px;background:linear-gradient(135deg,#13111A 0%,#0E0D14 100%);border-radius:24px;border:1px solid rgba(201,168,76,0.18);position:relative;overflow:hidden}
.daily-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#C9A84C,transparent)}
.daily-eyebrow{font-size:9px;font-weight:700;letter-spacing:4px;color:#C9A84C;text-transform:uppercase;margin-bottom:14px}
.daily-text{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;font-style:italic;line-height:1.6;color:#fff;position:relative;z-index:1}
.section-header{display:flex;justify-content:space-between;align-items:baseline;padding:36px 24px 18px;background:#06060A}
.section-title{font-size:11px;font-weight:700;letter-spacing:4px;color:#6B6880;text-transform:uppercase}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 24px 40px;background:#06060A}
.cat-card{position:relative;border-radius:22px;padding:26px 20px 22px;cursor:pointer;border:1px solid rgba(255,255,255,0.07);background:#0E0E14;overflow:hidden;transition:transform 0.2s ease;-webkit-tap-highlight-color:transparent}
.cat-card:active{transform:scale(0.97)}
.cat-glow{position:absolute;bottom:-30px;right:-30px;width:120px;height:120px;border-radius:50%;opacity:0.18}
.cat-shine{position:absolute;top:0;left:0;right:0;height:1px;opacity:0.6}
.cat-icon{font-size:36px;margin-bottom:14px;display:block;line-height:1}
.cat-name{font-size:15px;font-weight:700;color:#fff;margin-bottom:5px;line-height:1.2}
.cat-sub{font-size:11px;color:#6B6880;font-weight:500}
.cat-arrow{position:absolute;top:20px;right:20px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.05);display:flex;align-items:center;justify-content:center;font-size:12px;color:#6B6880}
.prayer-bg{position:absolute;inset:0;pointer-events:none;z-index:0;transition:background 0.5s ease}
.prayer-inner{position:relative;z-index:1;display:flex;flex-direction:column;height:100%}
.prayer-topbar{display:flex;align-items:center;justify-content:space-between;padding:52px 24px 0;flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:40px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:#F0EEE8;font-size:13px;font-weight:500;cursor:pointer;-webkit-tap-highlight-color:transparent}
.prayer-cat-label{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.prayer-counter{display:flex;align-items:center;padding:28px 24px 0;flex-shrink:0;gap:16px}
.counter-bar{flex:1;height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden}
.counter-fill{height:100%;border-radius:2px;transition:width 0.4s ease}
.counter-num{font-size:12px;font-weight:600;color:#6B6880;white-space:nowrap;min-width:40px;text-align:right}
.prayer-card-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;overflow:hidden}
.prayer-card{width:100%;max-width:380px;transition:opacity 0.3s ease,transform 0.3s ease}
.prayer-card.exit-up{opacity:0;transform:translateY(-32px)}
.prayer-card.exit-down{opacity:0;transform:translateY(32px)}
.prayer-num-label{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:28px;opacity:0.5;color:#F0EEE8}
.prayer-text{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;font-style:italic;line-height:1.65;color:#fff}
.prayer-divider{width:40px;height:2px;margin:32px 0;border-radius:2px}
.prayer-reflection{font-size:13px;line-height:1.7;color:#6B6880}
.prayer-nav{padding:0 24px 52px;display:flex;gap:12px;flex-shrink:0}
.nav-btn{flex:1;height:58px;border-radius:18px;border:none;font-weight:700;cursor:pointer;transition:all 0.2s ease;display:flex;align-items:center;justify-content:center;gap:8px;-webkit-tap-highlight-color:transparent;font-size:14px}
.nav-btn:disabled{opacity:0.25;cursor:default}
.nav-prev{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:#F0EEE8;flex:0 0 58px;font-size:18px}
.lang-header{padding:52px 24px 32px;flex-shrink:0;background:#06060A}
.lang-back{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:40px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.07);color:#F0EEE8;font-size:13px;font-weight:500;cursor:pointer;margin-bottom:32px;width:fit-content;-webkit-tap-highlight-color:transparent}
.lang-title{font-family:'Playfair Display',serif;font-size:34px;font-weight:900;color:#fff;margin-bottom:10px}
.lang-sub{font-size:14px;color:#6B6880;line-height:1.6}
.lang-list{padding:0 24px 40px;display:flex;flex-direction:column;gap:10px;background:#06060A}
.lang-item{display:flex;align-items:center;gap:18px;padding:20px 22px;border-radius:18px;background:#0E0E14;border:1px solid rgba(255,255,255,0.07);cursor:pointer;transition:all 0.2s;-webkit-tap-highlight-color:transparent}
.lang-item.selected{border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.07)}
.lang-flag{font-size:30px;line-height:1}
.lang-info{flex:1}
.lang-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:3px}
.lang-native{font-size:12px;color:#6B6880}
.lang-check{width:24px;height:24px;border-radius:50%;background:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:12px;color:#000;font-weight:800;opacity:0;transition:opacity 0.2s}
.lang-item.selected .lang-check{opacity:1}
</style>
</head>
<body style="background:#06060A;background-color:#06060A;color:#F0EEE8">
<div id="app">

<div class="screen active" id="home">
  <div class="home-glow"></div>
  <div class="home-inner">
    <div class="topbar">
      <div class="logo-mark">
        <span class="logo-name">Manifest</span>
        <span class="logo-sub">FC &middot; Football Prayers</span>
      </div>
      <div class="lang-pill" onclick="showScreen('language')">
        <span id="home-flag">&#127468;&#127463;</span>
        <span id="home-lang-label">English</span>
        <span style="opacity:0.5;font-size:10px">&#9660;</span>
      </div>

    <div class="scroll-area">
      <div class="daily-banner">
        <div class="daily-eyebrow" id="daily-eyebrow">Today's Declaration</div>
        <div class="daily-text" id="daily-text"></div>
      </div>
      <div class="section-header">
        <span class="section-title" id="section-title">Choose Your Prayer</span>
        <span style="font-size:11px;color:#6B6880" id="cat-count">8 categories</span>
      </div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>
  </div>
</div>

<div class="screen" id="prayer">
  <div class="prayer-bg" id="prayer-bg"></div>
  <div class="prayer-inner">
    <div class="prayer-topbar">
      <div class="back-btn" onclick="showScreen('home')">&#8592; <span id="back-label">Back</span></div>
      <div class="prayer-cat-label" id="prayer-cat-label"></div>
    </div>
    <div class="prayer-counter">
      <div class="counter-bar"><div class="counter-fill" id="counter-fill" style="width:5%"></div></div>
      <div class="counter-num" id="counter-num">1 / 20</div>

    <div class="prayer-card-area">
      <div class="prayer-card" id="prayer-card">
        <div class="prayer-num-label" id="prayer-number">Prayer 01</div>
        <div class="prayer-text" id="prayer-text"></div>
        <div class="prayer-divider" id="prayer-divider"></div>
        <div class="prayer-reflection" id="prayer-reflection"></div>
      </div>
    </div>
    <div class="prayer-nav">
      <button class="nav-btn nav-prev" id="prev-btn" onclick="prevPrayer()">&#8592;</button>
      <button class="nav-btn" id="next-btn" onclick="nextPrayer()" style="font-size:14px;font-weight:700">
        <span id="next-label">Next Prayer</span> <span>&#8594;</span>
      </button>
    </div>
  </div>
</div>

<div class="screen" id="language">
  <div class="lang-header">
    <div class="lang-back" onclick="showScreen('home')">&#8592; <span id="lang-back-label">Back</span></div>
    <div class="lang-title" id="lang-title">Your Language</div>
    <div class="lang-sub" id="lang-sub">All prayers will appear in your chosen language.</div>
  </div>
  <div class="scroll-area">
    <div class="lang-list" id="lang-list"></div>
  </div>
</div>

</div>
<script>
const LANGS=[
  {code:'en',label:'English',native:'English',flag:'&#127468;&#127463;'},
  {code:'es',label:'Espa&ntilde;ol',native:'Spanish',flag:'&#127466;&#127480;'},
  {code:'pt',label:'Portugu&ecirc;s',native:'Portuguese',flag:'&#127463;&#127479;'},
  {code:'fr',label:'Fran&ccedil;ais',native:'French',flag:'&#127467;&#127479;'},
  {code:'ar',label:'&#1575;&#1604;&#1593;&#1585;&#1576;&#1610;&#1577;',native:'Arabic',flag:'&#127474;&#127462;'},
  {code:'de',label:'Deutsch',native:'German',flag:'&#127465;&#127466;'}
];

const I18N={
en:{daily:“Today’s Declaration”,choose:“Choose Your Prayer”,back:“Back”,next:“Next Prayer”,langTitle:“Your Language”,langSub:“All prayers will appear in your chosen language.”,prayers:“Prayers”},
es:{daily:“Declaración de Hoy”,choose:“Elige Tu Oración”,back:“Volver”,next:“Siguiente Oración”,langTitle:“Tu Idioma”,langSub:“Todas las oraciones aparecerán en el idioma que elijas.”,prayers:“Oraciones”},
pt:{daily:“Declaração de Hoje”,choose:“Escolha Sua Oração”,back:“Voltar”,next:“Próxima Oração”,langTitle:“Seu Idioma”,langSub:“Todas as orações aparecerão no idioma que você escolher.”,prayers:“Orações”},
fr:{daily:“Déclaration du Jour”,choose:“Choisissez Votre Prière”,back:“Retour”,next:“Prière Suivante”,langTitle:“Votre Langue”,langSub:“Toutes les prières apparaîtront dans la langue choisie.”,prayers:“Prières”},
ar:{daily:“إعلان اليوم”,choose:“اختر صلاتك”,back:“رجوع”,next:“الصلاة التالية”,langTitle:“لغتك”,langSub:“ستظهر جميع الصلوات باللغة التي تختارها.”,prayers:“صلوات”},
de:{daily:“Heutige Erklärung”,choose:“Wähle Dein Gebet”,back:“Zurück”,next:“Nächstes Gebet”,langTitle:“Deine Sprache”,langSub:“Alle Gebete erscheinen in der gewählten Sprache.”,prayers:“Gebete”}
};

const DAILY={
en:“Today I stand in the gap for my team. I send courage before them and peace behind them. May every player step onto that pitch knowing they are not alone.”,
es:“Hoy me pongo en la brecha por mi equipo. Les envío valentía por delante y paz por detrás. Que cada jugador salga al campo sabiendo que no está solo.”,
pt:“Hoje me coloco na brecha pelo meu time. Envio coragem à frente deles e paz atrás. Que cada jogador entre em campo sabendo que não está sozinho.”,
fr:“Aujourd’hui je me tiens dans la brèche pour mon équipe. J’envoie du courage devant eux et la paix derrière eux. Que chaque joueur entre sur ce terrain sachant qu’il n’est pas seul.”,
ar:“اليوم أقف في الثغرة من أجل فريقي. أرسل الشجاعة أمامهم والسلام خلفهم. ليدخل كل لاعب إلى الملعب وهو يعلم أنه ليس وحده.”,
de:“Heute stehe ich in die Lücke für mein Team. Ich sende Mut vor ihnen und Frieden hinter ihnen. Möge jeder Spieler auf den Platz treten und wissen, dass er nicht allein ist.”
};

const CATS=[
{id:‘victory’,icon:’🏆’,color:’#C9A84C’,label:{en:‘Victory’,es:‘Victoria’,pt:‘Vitória’,fr:‘Victoire’,ar:‘النصر’,de:‘Sieg’}},
{id:‘courage’,icon:’🔥’,color:’#E05C2A’,label:{en:‘Courage’,es:‘Coraje’,pt:‘Coragem’,fr:‘Courage’,ar:‘الشجاعة’,de:‘Mut’}},
{id:‘focus’,icon:’🎯’,color:’#4A90D9’,label:{en:‘Focus’,es:‘Enfoque’,pt:‘Foco’,fr:‘Concentration’,ar:‘التركيز’,de:‘Fokus’}},
{id:‘comeback’,icon:’⚡’,color:’#9B59B6’,label:{en:‘Comeback’,es:‘Regreso’,pt:‘Volta’,fr:‘Retour’,ar:‘العودة’,de:‘Comeback’}},
{id:‘unity’,icon:’🤝’,color:’#27AE60’,label:{en:‘Unity’,es:‘Unidad’,pt:‘Unidade’,fr:‘Unité’,ar:‘الوحدة’,de:‘Einheit’}},
{id:‘strength’,icon:’💪’,color:’#E74C3C’,label:{en:‘Strength’,es:‘Fuerza’,pt:‘Força’,fr:‘Force’,ar:‘القوة’,de:‘Stärke’}},
{id:‘legacy’,icon:’👑’,color:’#F39C12’,label:{en:‘Legacy’,es:‘Legado’,pt:‘Legado’,fr:‘Héritage’,ar:‘الإرث’,de:‘Vermächtnis’}},
{id:‘nations’,icon:’🌍’,color:’#1ABC9C’,label:{en:‘Nations’,es:‘Naciones’,pt:‘Nações’,fr:‘Nations’,ar:‘الأمم’,de:‘Nationen’}}
];
const P={victory:{“en”: [{“t”: “I pray that my team rises today with a victory that belongs to them. Let every boot that strikes that ball carry the weight of a thousand hours of sacrifice — and let it land exactly where it needs to.”, “r”: “Speak this slowly. Feel the weight of every training session your players poured out for this moment.”}, {“t”: “May the final whistle blow in our favour. I call it in now, before the first kick. Victory is not a surprise — it is a declaration that was made before the game began.”, “r”: “You are not wishing for victory. You are summoning what already belongs to your team.”}, {“t”: “I pray that every shot on target finds its way. That the goalkeeper’s hands are steady. That the defenders hold their line. That the striker trusts the instinct that says: now.”, “r”: “Pray position by position. Cover your whole team in this declaration.”}, {“t”: “Today I release every prayer I have held in silence for this team. I speak over their legs: do not tire. I speak over their minds: do not doubt. I speak over their hearts: you were made for exactly this.”, “r”: “Let this be a sending-off. You are dispatching them with your words.”}, {“t”: “Let the scoreboard at the end of this match tell a story that people will repeat. Not just a win — but a statement. A match they will never forget.”, “r”: “Some victories are just results. Others become legends. Pray for the legendary kind.”}, {“t”: “I pray for goals. Not just the ones that go in — but the moments before them. The right pass. The right run. The right movement that opens the space that nobody else saw.”, “r”: “Football is a game of inches and instincts. Pray into the details.”}, {“t”: “May the spirit of this team be unbreakable today. Let no setback silence them. What was built in training does not crumble under pressure — it rises.”, “r”: “Resilience within a match is its own kind of victory. Declare it over them.”}, {“t”: “I pray that the referee sees clearly and judges fairly. That the conditions are equal and the best team — my team — wins on merit, on heart, and on will.”, “r”: “Pray over the context, not just the players. Every element of a match matters.”}, {“t”: “Let victory tonight belong to those who wanted it the most, who bled for it in training, who carried their nation’s hope in their chest every single day they showed up.”, “r”: “This is not blind support. This is a prayer rooted in what your players have genuinely sacrificed.”}, {“t”: “I declare that when that ball crosses the line, something shifts. Not just in the tournament — but in the nation. That a people watching from far away will rise and feel that they too have won something today.”, “r”: “Goals do more than change scores. They lift nations. Declare that lift.”}, {“t”: “I pray that my team’s captain leads with calm. That in the moments of chaos they become the eye of the storm. The one the others look to and feel safe.”, “r”: “Leadership under pressure is a gift. Pray it over your captain specifically.”}, {“t”: “May the bench be as alive as the pitch. May every substitute who enters carry the same energy, the same hunger, the same sharpness. No drop in intensity. No drop in desire.”, “r”: “Matches are often won by those who come on in the second half. Declare over them too.”}, {“t”: “I speak peace over the anxiety that comes before a big match. Let every player in that dressing room breathe deeply and know that they are ready. The preparation is done. Now they just have to play.”, “r”: “Pre-match nerves are real. This prayer covers the emotional state before a ball is even kicked.”}, {“t”: “May the opposition play their best — and may my team still win. I do not pray for the other side to fail. I pray for my team to rise so high that the gap cannot be closed.”, “r”: “Praying from abundance, not fear. You do not need the other team to fail. Yours just needs to soar.”}, {“t”: “I declare that every player on my team is exactly where they are supposed to be — on this pitch, in this tournament, in this moment. This is not an accident. This is their appointment.”, “r”: “Destiny is the deepest fuel. Pray that sense of appointment over every single player.”}, {“t”: “Let the supporters in the stadium and the millions watching at home feel something today. Not just sport — but something bigger. Let the energy of this team touch people who did not even know they needed to be touched.”, “r”: “The greatest matches become cultural moments. Declare that this is one of them.”}, {“t”: “I pray that the tactics work. That what the coach drew up on the board transfers perfectly onto the pitch. That when it bends, the players have the wisdom to adapt.”, “r”: “Tactics are intelligence. Pray over the mind of the coach and the discipline of the team.”}, {“t”: “For every player who is playing through pain today — a knock they have not told anyone about — I pray that their body holds. That adrenaline and purpose carry them through every single minute.”, “r”: “Most players in a major tournament are playing through something. Declare endurance over their bodies.”}, {“t”: “Let this victory be the one that unlocks the next. A momentum that does not stop. A belief that grows with every match. Let today be the beginning, not the peak.”, “r”: “Pray beyond today’s match. Speak a tournament-defining run into existence.”}, {“t”: “When the final whistle comes and my team has won, I pray that the celebration is full. That the tears are real. That the joy is unconstrained. That they know — truly know — what they have done and what it means.”, “r”: “Pray for the moment of victory itself. It deserves to be fully felt.”}], “es”: [{“t”: “Oro para que mi equipo se levante hoy con una victoria que les pertenece. Que cada bota que golpee ese balón lleve el peso de mil horas de sacrificio.”, “r”: “Habla despacio. Siente el peso de cada sesión de entrenamiento que tus jugadores dieron por este momento.”}, {“t”: “Que el silbato final suene a nuestro favor. La victoria no es una sorpresa — es una declaración que se hizo antes de que comenzara el juego.”, “r”: “No estás deseando la victoria. Estás convocando lo que ya le pertenece a tu equipo.”}, {“t”: “Oro para que cada disparo a portería encuentre su camino. Que las manos del portero estén firmes. Que el delantero confíe en el instinto que dice: ahora.”, “r”: “Ora posición por posición. Cubre a todo tu equipo en esta declaración.”}, {“t”: “Hoy libero cada oración que he guardado en silencio por este equipo. Hablo sobre sus piernas: no os canséis. Hablo sobre sus mentes: no dudéis. Hablo sobre sus corazones: fuisteis hechos exactamente para esto.”, “r”: “Que esto sea un envío. Estás despachándolos con tus palabras.”}, {“t”: “Que el marcador al final de este partido cuente una historia que la gente repetirá. No solo una victoria — sino una declaración.”, “r”: “Algunas victorias son solo resultados. Otras se convierten en leyendas.”}, {“t”: “Oro por los goles. No solo los que entran — sino los momentos antes de ellos. El pase correcto. La carrera correcta. El movimiento que abre el espacio que nadie más vio.”, “r”: “El fútbol es un juego de centímetros e instintos. Ora en los detalles.”}, {“t”: “Que el espíritu de este equipo sea inquebrantable hoy. Lo que se construyó en el entrenamiento no se desmorona bajo presión — se eleva.”, “r”: “La resiliencia dentro de un partido es su propia victoria.”}, {“t”: “Oro para que el árbitro vea con claridad y juzgue con justicia. Que el mejor equipo — mi equipo — gane por mérito y por corazón.”, “r”: “Ora sobre el contexto, no solo sobre los jugadores.”}, {“t”: “Que la victoria esta noche pertenezca a quienes más la quisieron, quienes sangraron por ella en el entrenamiento.”, “r”: “Esto no es apoyo ciego. Es una oración enraizada en lo que tus jugadores han sacrificado genuinamente.”}, {“t”: “Declaro que cuando ese balón cruce la línea, algo cambia. No solo en el torneo — sino en la nación entera.”, “r”: “Los goles hacen más que cambiar marcadores. Elevan naciones.”}, {“t”: “Oro para que el capitán de mi equipo lidere con calma. Que en los momentos de caos se convierta en el ojo de la tormenta.”, “r”: “El liderazgo bajo presión es un regalo. Ora específicamente por tu capitán.”}, {“t”: “Que el banquillo esté tan vivo como el campo. Que cada sustituto que entre lleve la misma energía y el mismo hambre.”, “r”: “Los partidos a menudo los ganan quienes entran en la segunda parte.”}, {“t”: “Hablo paz sobre la ansiedad que viene antes de un gran partido. Que cada jugador en ese vestuario respire profundamente y sepa que está listo.”, “r”: “Los nervios pre-partido son reales.”}, {“t”: “Que el equipo rival juegue lo mejor que puede — y que mi equipo gane de todas formas. No oro para que el otro lado fracase.”, “r”: “Orar desde la abundancia, no desde el miedo.”}, {“t”: “Declaro que cada jugador de mi equipo está exactamente donde se supone que debe estar. Esto no es un accidente. Es su cita con el destino.”, “r”: “El destino es el combustible más profundo.”}, {“t”: “Que los aficionados en el estadio y los millones que ven en casa sientan algo hoy. No solo deporte — sino algo más grande.”, “r”: “Los partidos más grandes se convierten en momentos culturales.”}, {“t”: “Oro para que las tácticas funcionen. Que lo que el entrenador dibujó en la pizarra se transfiera perfectamente al campo.”, “r”: “Las tácticas son inteligencia. Ora sobre la mente del entrenador.”}, {“t”: “Por cada jugador que hoy juega con dolor — oro para que su cuerpo aguante. Que la adrenalina y el propósito los lleven a través de cada minuto.”, “r”: “La mayoría de los jugadores en un torneo importante juegan con algo.”}, {“t”: “Que esta victoria sea la que desbloquea la siguiente. Un impulso que no se detiene. Una creencia que crece con cada partido.”, “r”: “Ora más allá del partido de hoy.”}, {“t”: “Cuando llegue el silbato final y mi equipo haya ganado, oro para que la celebración sea completa. Que las lágrimas sean reales.”, “r”: “Ora por el momento de la victoria en sí.”}], “pt”: [{“t”: “Oro para que meu time se levante hoje com uma vitória que lhes pertence. Que cada chuteira que tocar nessa bola carregue o peso de mil horas de sacrifício.”, “r”: “Fale devagar. Sinta o peso de cada sessão de treinamento que seus jogadores dedicaram para este momento.”}, {“t”: “Que o apito final soe a nosso favor. A vitória não é uma surpresa — é uma declaração feita antes do jogo começar.”, “r”: “Você não está desejando a vitória. Você está convocando o que já pertence ao seu time.”}, {“t”: “Oro para que cada chute a gol encontre seu caminho. Que as mãos do goleiro estejam firmes. Que o atacante confie no instinto que diz: agora.”, “r”: “Ore posição por posição. Cubra todo o seu time nessa declaração.”}, {“t”: “Hoje libero cada oração que guardei em silêncio por este time. Falo sobre suas pernas: não cansem. Falo sobre suas mentes: não duvidem. Falo sobre seus corações: vocês foram feitos exatamente para isso.”, “r”: “Que isto seja um envio. Você os está despachando com suas palavras.”}, {“t”: “Que o placar ao final desta partida conte uma história que as pessoas vão repetir. Não apenas uma vitória — mas uma declaração.”, “r”: “Algumas vitórias são apenas resultados. Outras se tornam lendas.”}, {“t”: “Oro por gols. Não apenas os que entram — mas os momentos antes deles. O passe certo. A corrida certa. O movimento que abre o espaço que ninguém mais viu.”, “r”: “O futebol é um jogo de centímetros e instintos. Ore nos detalhes.”}, {“t”: “Que o espírito deste time seja inabaluável hoje. O que foi construído no treinamento não desmorona sob pressão — ele se eleva.”, “r”: “A resiliência dentro de uma partida é sua própria vitória.”}, {“t”: “Oro para que o árbitro veja claramente e julgue com justiça. Que o melhor time — meu time — vença por mérito e por coração.”, “r”: “Ore sobre o contexto, não apenas sobre os jogadores.”}, {“t”: “Que a vitória esta noite pertença àqueles que mais a quiseram, que sangraram por ela no treinamento.”, “r”: “Isso não é apoio cego. É uma oração enraizada no que seus jogadores genuinamente sacrificaram.”}, {“t”: “Declaro que quando essa bola cruzar a linha, algo muda. Não apenas no torneio — mas na nação inteira.”, “r”: “Gols fazem mais do que mudar placares. Eles elevam nações.”}, {“t”: “Oro para que o capitão do meu time lidere com calma. Que nos momentos de caos ele se torne o olho da tempestade.”, “r”: “Liderança sob pressão é um dom. Ore especificamente pelo seu capitão.”}, {“t”: “Que o banco esteja tão vivo quanto o campo. Que cada substituto que entrar carregue a mesma energia e fome.”, “r”: “As partidas muitas vezes são ganhas por quem entra na segunda metade.”}, {“t”: “Falo paz sobre a ansiedade que vem antes de uma grande partida. Que cada jogador saiba que está pronto.”, “r”: “O nervosismo pré-jogo é real.”}, {“t”: “Que o adversário jogue o seu melhor — e que meu time ainda vença. Não oro para que o outro lado fracasse.”, “r”: “Orando da abundância, não do medo.”}, {“t”: “Declaro que cada jogador do meu time está exatamente onde deveria estar. Isso não é um acidente. É o seu compromisso com o destino.”, “r”: “O destino é o combustível mais profundo.”}, {“t”: “Que os torcedores no estádio e os milhões assistindo em casa sintam algo hoje. Não apenas esporte — mas algo maior.”, “r”: “As maiores partidas se tornam momentos culturais.”}, {“t”: “Oro para que a tática funcione. Que o que o técnico desenhou no quadro se transfira perfeitamente para o campo.”, “r”: “Táticas são inteligência. Ore sobre a mente do técnico.”}, {“t”: “Por cada jogador que hoje joga com dor — oro para que seu corpo aguente. Que a adrenalina e o propósito os carreguem.”, “r”: “A maioria dos jogadores em um torneio importante está gerenciando algo fisicamente.”}, {“t”: “Que esta vitória seja a que desbloqueia a próxima. Um ímpeto que não para. Uma crença que cresce a cada partida.”, “r”: “Ore além da partida de hoje.”}, {“t”: “Quando o apito final soar e meu time tiver vencido, oro para que a celebração seja plena. Que as lágrimas sejam reais.”, “r”: “Ore pelo momento da vitória em si.”}], “fr”: [{“t”: “Je prie pour que mon équipe se lève aujourd’hui avec une victoire qui lui appartient. Que chaque botte qui frappe ce ballon porte le poids de mille heures de sacrifice.”, “r”: “Parlez lentement. Ressentez le poids de chaque séance d’entraînement.”}, {“t”: “Que le coup de sifflet final retentisse en notre faveur. La victoire n’est pas une surprise — c’est une déclaration faite avant que le jeu commence.”, “r”: “Vous ne souhaitez pas la victoire. Vous invoquez ce qui appartient déjà à votre équipe.”}, {“t”: “Je prie pour que chaque tir cadré trouve son chemin. Que les mains du gardien soient stables. Que l’attaquant fasse confiance à l’instinct qui dit : maintenant.”, “r”: “Priez poste par poste. Couvrez toute votre équipe dans cette déclaration.”}, {“t”: “Aujourd’hui je libère chaque prière que j’ai gardée en silence pour cette équipe. Je parle sur leurs jambes: ne vous fatiguez pas. Je parle sur leurs cœurs: vous avez été faits exactement pour cela.”, “r”: “Que ce soit un envoi. Vous les expédiez avec vos mots.”}, {“t”: “Que le tableau d’affichage à la fin de ce match raconte une histoire que les gens vont répéter. Pas seulement une victoire — mais une déclaration.”, “r”: “Certaines victoires ne sont que des résultats. D’autres deviennent des légendes.”}, {“t”: “Je prie pour des buts. Pas seulement ceux qui entrent — mais les moments avant eux. La bonne passe. La bonne course. Le bon mouvement qui ouvre l’espace.”, “r”: “Le football est un jeu de centimètres et d’instincts. Priez dans les détails.”}, {“t”: “Que l’esprit de cette équipe soit inébranlable aujourd’hui. Ce qui a été construit à l’entraînement ne s’effondre pas sous la pression — il s’élève.”, “r”: “La résilience dans un match est sa propre forme de victoire.”}, {“t”: “Je prie pour que l’arbitre voie clairement et juge équitablement. Que la meilleure équipe — mon équipe — gagne sur le mérite et le cœur.”, “r”: “Priez sur le contexte, pas seulement sur les joueurs.”}, {“t”: “Que la victoire ce soir appartienne à ceux qui la voulaient le plus, qui ont saigné pour elle à l’entraînement.”, “r”: “Ce n’est pas un soutien aveugle. C’est une prière enracinée dans ce que vos joueurs ont sacrifié.”}, {“t”: “Je déclare que lorsque ce ballon franchit la ligne, quelque chose change. Pas seulement dans le tournoi — mais dans la nation.”, “r”: “Les buts font plus que changer des scores. Ils élèvent des nations.”}, {“t”: “Je prie pour que le capitaine de mon équipe dirige avec calme. Que dans les moments de chaos il devienne l’œil de la tempête.”, “r”: “Le leadership sous pression est un don. Priez-le spécifiquement sur votre capitaine.”}, {“t”: “Que le banc soit aussi vivant que le terrain. Que chaque remplaçant qui entre porte la même énergie et la même faim.”, “r”: “Les matches sont souvent gagnés par ceux qui entrent en seconde période.”}, {“t”: “Je parle de paix sur l’anxiété qui vient avant un grand match. Que chaque joueur sache qu’il est prêt.”, “r”: “Les nerfs d’avant-match sont réels.”}, {“t”: “Que l’opposition joue de son mieux — et que mon équipe gagne quand même. Je ne prie pas pour que l’autre côté échoue.”, “r”: “Prier depuis l’abondance, pas la peur.”}, {“t”: “Je déclare que chaque joueur de mon équipe est exactement là où il est censé être. Ce n’est pas un accident. C’est leur rendez-vous avec le destin.”, “r”: “Le destin est le carburant le plus profond.”}, {“t”: “Que les supporters dans le stade et les millions qui regardent chez eux ressentent quelque chose aujourd’hui. Pas seulement du sport — mais quelque chose de plus grand.”, “r”: “Les plus grands matches deviennent des moments culturels.”}, {“t”: “Je prie pour que les tactiques fonctionnent. Que ce que l’entraîneur a dessiné se transfère parfaitement sur le terrain.”, “r”: “Les tactiques sont de l’intelligence.”}, {“t”: “Pour chaque joueur qui joue avec de la douleur aujourd’hui — je prie pour que leur corps tienne. Que l’adrénaline les porte à travers chaque minute.”, “r”: “La plupart des joueurs dans un tournoi majeur gèrent quelque chose physiquement.”}, {“t”: “Que cette victoire soit celle qui déverrouille la prochaine. Un élan qui ne s’arrête pas.”, “r”: “Priez au-delà du match d’aujourd’hui.”}, {“t”: “Quand le coup de sifflet final vient et que mon équipe a gagné, je prie pour que la célébration soit complète. Que les larmes soient vraies.”, “r”: “Priez pour le moment de la victoire lui-même.”}], “ar”: [{“t”: “أصلّي لكي يرتفع فريقي اليوم بنصر يخصّهم. ليحمل كل حذاء يضرب تلك الكرة ثقل ألف ساعة من التضحية.”, “r”: “تحدّث ببطء. اشعر بثقل كل جلسة تدريب قدّمها لاعبوك من أجل هذه اللحظة.”}, {“t”: “ليدوّ الصافرة النهائية لصالحنا. النصر ليس مفاجأة — إنه إعلان صُنع قبل أن تبدأ اللعبة.”, “r”: “أنت لا تتمنّى النصر. أنت تستدعي ما يخصّ فريقك بالفعل.”}, {“t”: “أصلّي لكي تجد كل تسديدة في المرمى طريقها. أن تكون يدا الحارس ثابتتين.”, “r”: “صلِّ على كل مركز على حدة. غطِّ فريقك بأكمله في هذا الإعلان.”}, {“t”: “اليوم أُطلق كل صلاة احتفظت بها في صمت. أتحدث على أرجلهم: لا تتعبوا. على قلوبهم: لقد خُلقتم لهذا تحديداً.”, “r”: “ليكن هذا إرسالاً. أنت تُرسلهم بكلماتك.”}, {“t”: “ليحكي لوح النتائج في نهاية هذه المباراة قصةً سيرددها الناس. ليس فوزاً فحسب — بل بياناً.”, “r”: “بعض الانتصارات مجرد نتائج. وأخرى تصبح أساطير.”}, {“t”: “أصلّي من أجل الأهداف. ليس فقط التي تدخل — بل اللحظات قبلها. التمريرة الصحيحة.”, “r”: “كرة القدم لعبة سنتيمترات وغرائز.”}, {“t”: “ليكن روح هذا الفريق لا يتزعزع اليوم. ما بُني في التدريب لا ينهار تحت الضغط — بل يرتفع.”, “r”: “الصمود داخل المباراة هو نصر من نوعه.”}, {“t”: “أصلّي لكي يرى الحكم بوضوح ويحكم بعدل. أن يفوز أفضل فريق — فريقي.”, “r”: “صلِّ على السياق ليس فقط على اللاعبين.”}, {“t”: “ليكن النصر الليلة لمن أرادوه أكثر، لمن نزفوا من أجله في التدريب.”, “r”: “هذا ليس دعماً أعمى.”}, {“t”: “أعلن أنه حين تعبر تلك الكرة الخط، يتغيّر شيء ما. ليس فقط في البطولة — بل في الأمة.”, “r”: “الأهداف تفعل أكثر من تغيير النتائج. إنها ترفع الأمم.”}, {“t”: “أصلّي لكي يقود كابتن فريقي بهدوء. أن يصبح في لحظات الفوضى عين العاصفة.”, “r”: “القيادة تحت الضغط هبة.”}, {“t”: “ليكن الاحتياطيون على المقعد بنفس حيوية الملعب. ليحمل كل بديل نفس الطاقة.”, “r”: “غالباً ما تُحسم المباريات بمن يدخلون في الشوط الثاني.”}, {“t”: “أتحدث بالسلام على القلق الذي يسبق مباراةً كبيرة. ليعلم كل لاعب أنه مستعد.”, “r”: “التوتر قبل المباراة حقيقي.”}, {“t”: “ليلعب المنافس أفضل ما عنده — وليفز فريقي بالرغم من ذلك. لا أصلّي لكي يفشل الجانب الآخر.”, “r”: “الصلاة من الوفرة، لا من الخوف.”}, {“t”: “أعلن أن كل لاعب في فريقي في المكان المفترض أن يكون فيه تماماً. هذا ليس مصادفة.”, “r”: “القدر هو أعمق وقود.”}, {“t”: “ليشعر المشجعون في الملعب والملايين بشيء اليوم. ليس رياضةً فحسب.”, “r”: “أعظم المباريات تصبح لحظاتٍ ثقافية.”}, {“t”: “أصلّي لكي تنجح التكتيكات. أن ما رسمه المدرب على السبورة ينتقل بشكل مثالي.”, “r”: “التكتيكات هي ذكاء.”}, {“t”: “لكل لاعب يلعب اليوم متحملاً الألم — أصلّي لكي يصمد جسده.”, “r”: “معظم اللاعبين في البطولات الكبرى يديرون شيئاً جسدياً.”}, {“t”: “ليكن هذا النصر هو الذي يفتح الباب للتالي. زخم لا يتوقف. إيمان يكبر مع كل مباراة.”, “r”: “صلِّ ما وراء مباراة اليوم.”}, {“t”: “حين يأتي الصافرة الأخيرة وفاز فريقي، أصلّي لتكون الاحتفالات كاملة. أن تكون الدموع حقيقية.”, “r”: “صلِّ من أجل لحظة النصر ذاتها.”}], “de”: [{“t”: “Ich bete, dass meine Mannschaft heute mit einem Sieg aufsteht, der ihr gehört. Möge jeder Schuh, der den Ball trifft, das Gewicht von tausend Stunden Aufopferung tragen.”, “r”: “Sprich langsam. Spüre das Gewicht jeder Trainingseinheit, die deine Spieler für diesen Moment aufgebracht haben.”}, {“t”: “Möge der letzte Pfiff zu unseren Gunsten ertönen. Der Sieg ist keine Überraschung — er ist eine Erklärung, die vor Spielbeginn gemacht wurde.”, “r”: “Du wünschst dir keinen Sieg. Du rufst herbei, was deiner Mannschaft bereits gehört.”}, {“t”: “Ich bete, dass jeder Schuss auf das Tor seinen Weg findet. Dass die Hände des Torwarts ruhig sind. Dass der Stürmer dem Instinkt vertraut, der sagt: jetzt.”, “r”: “Bete Position für Position. Decke deine gesamte Mannschaft in dieser Erklärung ab.”}, {“t”: “Heute lasse ich jedes Gebet los, das ich im Stillen für diese Mannschaft gehalten habe. Ich spreche über ihre Beine: werdet nicht müde. Ich spreche über ihre Herzen: ihr wurdet genau dafür gemacht.”, “r”: “Lass dies eine Aussendung sein. Du schickst sie mit deinen Worten aus.”}, {“t”: “Möge die Anzeigetafel am Ende dieses Spiels eine Geschichte erzählen, die die Menschen wiederholen werden. Nicht nur ein Sieg — sondern eine Aussage.”, “r”: “Manche Siege sind nur Ergebnisse. Andere werden zu Legenden.”}, {“t”: “Ich bete für Tore. Nicht nur die, die reingehen — sondern die Momente davor. Die richtige Vorlage. Der richtige Lauf. Die richtige Bewegung, die den Raum öffnet.”, “r”: “Fußball ist ein Spiel von Zentimetern und Instinkten. Bete in die Details.”}, {“t”: “Möge der Geist dieser Mannschaft heute unzerbrechlich sein. Was im Training aufgebaut wurde, bricht unter Druck nicht zusammen — es steigt auf.”, “r”: “Resilienz innerhalb eines Spiels ist ihre eigene Art von Sieg.”}, {“t”: “Ich bete, dass der Schiedsrichter klar sieht und fair urteilt. Dass die beste Mannschaft — meine Mannschaft — aufgrund von Verdienst und Herz gewinnt.”, “r”: “Bete über den Kontext, nicht nur über die Spieler.”}, {“t”: “Möge der heutige Sieg denen gehören, die ihn am meisten wollten, die dafür im Training geblutet haben.”, “r”: “Das ist keine blinde Unterstützung. Das ist ein Gebet verwurzelt in dem, was deine Spieler geopfert haben.”}, {“t”: “Ich erkläre, dass wenn der Ball die Linie überschreitet, sich etwas verschiebt. Nicht nur im Turnier — sondern in der Nation.”, “r”: “Tore tun mehr als Ergebnisse zu verändern. Sie erheben Nationen.”}, {“t”: “Ich bete, dass der Kapitän meiner Mannschaft mit Ruhe führt. Dass er in den Momenten des Chaos zum Auge des Sturms wird.”, “r”: “Führung unter Druck ist ein Geschenk. Bete es speziell über deinen Kapitän.”}, {“t”: “Möge die Bank so lebendig sein wie der Platz. Möge jeder Einwechselspieler die gleiche Energie und den gleichen Hunger mitbringen.”, “r”: “Spiele werden oft von denen gewonnen, die in der zweiten Halbzeit eingewechselt werden.”}, {“t”: “Ich spreche Frieden über die Angst, die vor einem großen Spiel kommt. Möge jeder Spieler tief durchatmen und wissen, dass er bereit ist.”, “r”: “Vorspiel-Nerven sind real.”}, {“t”: “Möge der Gegner sein Bestes geben — und möge meine Mannschaft trotzdem gewinnen. Ich bete nicht dafür, dass die andere Seite scheitert.”, “r”: “Aus der Fülle heraus beten, nicht aus Angst.”}, {“t”: “Ich erkläre, dass jeder Spieler in meiner Mannschaft genau dort ist, wo er sein soll. Das ist kein Zufall. Das ist ihre Bestimmung.”, “r”: “Schicksal ist der tiefste Treibstoff.”}, {“t”: “Mögen die Fans im Stadion und die Millionen, die zu Hause schauen, heute etwas fühlen. Nicht nur Sport — sondern etwas Größeres.”, “r”: “Die größten Spiele werden zu kulturellen Momenten.”}, {“t”: “Ich bete, dass die Taktik funktioniert. Dass das, was der Trainer entworfen hat, sich perfekt auf den Platz überträgt.”, “r”: “Taktik ist Intelligenz. Bete über den Geist des Trainers.”}, {“t”: “Für jeden Spieler, der heute durch Schmerzen spielt — bete ich, dass ihr Körper standhält. Dass Adrenalin und Zweck sie durch jede Minute tragen.”, “r”: “Die meisten Spieler in einem großen Turnier kämpfen mit etwas physisch.”}, {“t”: “Möge dieser Sieg der sein, der den nächsten freischaltet. Ein Schwung, der nicht aufhört. Ein Glaube, der mit jedem Spiel wächst.”, “r”: “Bete über das heutige Spiel hinaus.”}, {“t”: “Wenn der letzte Pfiff kommt und meine Mannschaft gewonnen hat, bete ich, dass die Feier vollständig ist. Dass die Tränen echt sind.”, “r”: “Bete für den Moment des Sieges selbst. Er verdient es, vollständig gespürt zu werden.”}]}};

let lang=‘en’, cat=null, idx=0;

function showScreen(id){document.querySelectorAll(’.screen’).forEach(s=>s.classList.remove(‘active’));document.getElementById(id).classList.add(‘active’);}

function renderHome(){
const t=I18N[lang];
const l=LANGS.find(x=>x.code===lang);
document.getElementById(‘home-flag’).innerHTML=l.flag;
document.getElementById(‘home-lang-label’).textContent=l.label.replace(/&[a-z]+;/g,’’).replace(/&#[0-9]+;/g,’’);
document.getElementById(‘home-lang-label’).innerHTML=l.label;
document.getElementById(‘daily-eyebrow’).textContent=t.daily;
document.getElementById(‘daily-text’).textContent=’”’+(DAILY[lang]||DAILY.en)+’”’;
document.getElementById(‘section-title’).textContent=t.choose;
document.getElementById(‘cat-count’).textContent=CATS.length+’ categories’;
document.documentElement.dir=lang===‘ar’?‘rtl’:‘ltr’;
document.getElementById(‘cat-grid’).innerHTML=CATS.map(c=>` <div class="cat-card" onclick="openCat('${c.id}')"> <div class="cat-shine" style="background:linear-gradient(90deg,transparent,${c.color}40,transparent)"></div> <div class="cat-glow" style="background:radial-gradient(circle,${c.color} 0%,transparent 70%)"></div> <span class="cat-icon">${c.icon}</span> <div class="cat-name">${c.label[lang]||c.label.en}</div> <div class="cat-sub">20 ${t.prayers}</div> <div class="cat-arrow">&#8250;</div> </div>`).join(’’);
}

function renderLangs(){
const t=I18N[lang];
document.getElementById(‘lang-title’).textContent=t.langTitle;
document.getElementById(‘lang-sub’).textContent=t.langSub;
document.getElementById(‘lang-back-label’).textContent=t.back;
document.getElementById(‘lang-list’).innerHTML=LANGS.map(l=>` <div class="lang-item${l.code===lang?' selected':''}" onclick="setLang('${l.code}')"> <div class="lang-flag">${l.flag}</div> <div class="lang-info"><div class="lang-name">${l.label}</div><div class="lang-native">${l.native}</div></div> <div class="lang-check">&#10003;</div> </div>`).join(’’);
}

function openCat(id){
cat=id; idx=0;
const c=CATS.find(x=>x.id===id);
document.getElementById(‘prayer-bg’).style.background=`radial-gradient(ellipse at 50% 0%,${c.color}18 0%,transparent 60%)`;
document.getElementById(‘prayer-cat-label’).innerHTML=`<span>${c.icon}</span><span style="color:${c.color}">${c.label[lang]||c.label.en}</span>`;
document.getElementById(‘counter-fill’).style.background=c.color;
document.getElementById(‘prayer-divider’).style.background=c.color;
document.getElementById(‘next-btn’).style.background=c.color;
document.getElementById(‘next-btn’).style.color=’#000’;
document.getElementById(‘back-label’).textContent=I18N[lang].back;
renderPrayer();
showScreen(‘prayer’);
}

function getPrayers(){return(P[cat]&&(P[cat][lang]||P[cat].en))||[];}

function renderPrayer(dir){
const ps=getPrayers();
const card=document.getElementById(‘prayer-card’);
if(dir){
card.classList.add(dir>0?‘exit-up’:‘exit-down’);
setTimeout(()=>{card.classList.remove(‘exit-up’,‘exit-down’);setContent(ps);},280);
}else{setContent(ps);}
}

function setContent(ps){
const p=ps[idx];
document.getElementById(‘prayer-number’).textContent=‘Prayer ‘+String(idx+1).padStart(2,‘0’);
document.getElementById(‘prayer-text’).textContent=’”’+p.t+’”’;
document.getElementById(‘prayer-reflection’).textContent=p.r;
document.getElementById(‘counter-fill’).style.width=((idx+1)/ps.length*100)+’%’;
document.getElementById(‘counter-num’).textContent=(idx+1)+’ / ’+ps.length;
document.getElementById(‘prev-btn’).disabled=idx===0;
document.getElementById(‘next-btn’).disabled=idx===ps.length-1;
document.getElementById(‘next-label’).textContent=idx<ps.length-1?(I18N[lang].next||‘Next Prayer’):‘Complete \u2713’;
}

function nextPrayer(){const ps=getPrayers();if(idx<ps.length-1){idx++;renderPrayer(1);}}
function prevPrayer(){if(idx>0){idx–;renderPrayer(-1);}}

function setLang(code){
lang=code;
renderHome();
renderLangs();
showScreen(‘home’);
}

renderHome();
renderLangs();
</script>
