<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manifest FC</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#06060A;color:#F0EEE8;font-family:Inter,sans-serif;height:100%;overflow:hidden}
#app{position:fixed;inset:0;background:#06060A;max-width:430px;margin:0 auto;display:flex;flex-direction:column}
.screen{position:absolute;inset:0;background:#06060A;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s}
.screen.active{opacity:1;pointer-events:all}
.scroll{flex:1;overflow-y:auto;background:#06060A}
.scroll::-webkit-scrollbar{display:none}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:52px 24px 0}
.logo-name{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px;font-style:italic}
.logo-sub{font-size:9px;font-weight:700;letter-spacing:5px;color:#C9A84C;text-transform:uppercase;margin-top:2px}
.lang-btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:40px;border:1px solid rgba(201,168,76,.3);background:rgba(201,168,76,.06);color:#C9A84C;font-size:12px;font-weight:600;cursor:pointer}

/* BANNER */
.banner{margin:28px 24px 0;padding:24px;background:linear-gradient(135deg,#13111A,#0E0D14);border-radius:20px;border:1px solid rgba(201,168,76,.18);position:relative;overflow:hidden}
.banner::before{content:’’;position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#C9A84C,transparent)}
.banner-label{font-size:9px;font-weight:700;letter-spacing:4px;color:#C9A84C;text-transform:uppercase;margin-bottom:12px}
.banner-text{font-size:17px;font-weight:700;font-style:italic;color:#fff;line-height:1.6}

/* SECTION */
.sec-header{display:flex;justify-content:space-between;padding:32px 24px 16px;background:#06060A}
.sec-title{font-size:11px;font-weight:700;letter-spacing:4px;color:#6B6880;text-transform:uppercase}
.sec-count{font-size:11px;color:#6B6880}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 24px 40px;background:#06060A}
.card{border-radius:20px;padding:22px 18px 18px;background:#0E0E14;border:1px solid rgba(255,255,255,.07);cursor:pointer;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.card:active{transform:scale(.97)}
.card-glow{position:absolute;bottom:-30px;right:-30px;width:100px;height:100px;border-radius:50%;opacity:.18}
.card-icon{font-size:32px;margin-bottom:12px;display:block;line-height:1}
.card-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:4px}
.card-sub{font-size:11px;color:#6B6880}
.card-arrow{position:absolute;top:16px;right:16px;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:14px;color:#6B6880}

/* PRAYER SCREEN */
.prayer-top{display:flex;align-items:center;justify-content:space-between;padding:52px 24px 0;flex-shrink:0}
.back{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:40px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:#F0EEE8;font-size:13px;cursor:pointer}
.cat-label{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.prog{display:flex;align-items:center;padding:24px 24px 0;gap:14px;flex-shrink:0}
.prog-bar{flex:1;height:2px;background:rgba(255,255,255,.07);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .4s}
.prog-num{font-size:12px;color:#6B6880;min-width:36px;text-align:right}
.card-area{flex:1;display:flex;align-items:center;padding:24px;overflow:hidden}
.prayer-card{width:100%;transition:opacity .3s,transform .3s}
.prayer-card.out-up{opacity:0;transform:translateY(-28px)}
.prayer-card.out-dn{opacity:0;transform:translateY(28px)}
.p-num{font-size:10px;font-weight:700;letter-spacing:4px;text-transform:uppercase;opacity:.4;margin-bottom:24px;color:#F0EEE8}
.p-text{font-size:21px;font-weight:700;font-style:italic;line-height:1.65;color:#fff}
.p-div{width:36px;height:2px;margin:28px 0;border-radius:2px}
.p-reflect{font-size:13px;line-height:1.7;color:#6B6880}
.nav{padding:0 24px 48px;display:flex;gap:12px;flex-shrink:0}
.nav-btn{height:56px;border-radius:16px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-weight:700;font-size:14px;-webkit-tap-highlight-color:transparent;transition:opacity .2s}
.nav-btn:disabled{opacity:.25}
#prev-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:#F0EEE8;flex:0 0 56px;font-size:18px}
#next-btn{flex:1}

/* LANG SCREEN */
.lang-hdr{padding:52px 24px 28px;background:#06060A;flex-shrink:0}
.lang-back{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:40px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);color:#F0EEE8;font-size:13px;cursor:pointer;width:fit-content;margin-bottom:28px}
.lang-title{font-size:30px;font-weight:900;color:#fff;margin-bottom:8px}
.lang-sub-text{font-size:13px;color:#6B6880}
.lang-list{padding:0 24px 40px;display:flex;flex-direction:column;gap:10px;background:#06060A}
.lang-row{display:flex;align-items:center;gap:16px;padding:18px 20px;border-radius:16px;background:#0E0E14;border:1px solid rgba(255,255,255,.07);cursor:pointer;-webkit-tap-highlight-color:transparent}
.lang-row.sel{border-color:rgba(201,168,76,.4);background:rgba(201,168,76,.07)}
.lang-flag{font-size:28px;line-height:1}
.lang-info{flex:1}
.lang-lbl{font-size:15px;font-weight:700;color:#fff;margin-bottom:2px}
.lang-nat{font-size:12px;color:#6B6880}
.lang-tick{width:22px;height:22px;border-radius:50%;background:#C9A84C;display:flex;align-items:center;justify-content:center;font-size:11px;color:#000;font-weight:800;opacity:0;transition:opacity .2s}
.lang-row.sel .lang-tick{opacity:1}
</style>

</head>
<body>
<div id="app">

<!-- HOME -->

<div id="home" class="screen active">
  <div class="topbar">
    <div>
      <div class="logo-name">Manifest</div>
      <div class="logo-sub">FC &middot; Football Prayers</div>
    </div>
    <div class="lang-btn" onclick="go('language')">
      <span id="hflag">&#127468;&#127463;</span>
      <span id="hlang">English</span>
      <span style="opacity:.5;font-size:10px">&#9660;</span>
    </div>
  </div>
  <div class="scroll">
    <div class="banner">
      <div class="banner-label" id="blabel">Today's Declaration</div>
      <div class="banner-text" id="btext"></div>
    </div>
    <div class="sec-header">
      <span class="sec-title" id="sec-title">Choose Your Prayer</span>
      <span class="sec-count">8 categories</span>
    </div>
    <div class="grid" id="grid"></div>
  </div>
</div>

<!-- PRAYER -->

<div id="prayer" class="screen">
  <div id="pbg" style="position:absolute;inset:0;pointer-events:none;z-index:0;transition:background .5s"></div>
  <div style="position:relative;z-index:1;display:flex;flex-direction:column;height:100%">
    <div class="prayer-top">
      <div class="back" onclick="go('home')">&#8592; <span id="back-lbl">Back</span></div>
      <div class="cat-label" id="cat-label"></div>
    </div>
    <div class="prog">
      <div class="prog-bar"><div class="prog-fill" id="pfill" style="width:5%"></div></div>
      <div class="prog-num" id="pnum">1 / 20</div>
    </div>
    <div class="card-area">
      <div class="prayer-card" id="pcard">
        <div class="p-num" id="pn">Prayer 01</div>
        <div class="p-text" id="pt"></div>
        <div class="p-div" id="pdiv"></div>
        <div class="p-reflect" id="pr"></div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn" id="prev-btn" onclick="prev()">&#8592;</button>
      <button class="nav-btn" id="next-btn" onclick="next()"><span id="next-lbl">Next Prayer</span> &#8594;</button>
    </div>
  </div>
</div>

<!-- LANGUAGE -->

<div id="language" class="screen">
  <div class="lang-hdr">
    <div class="lang-back" onclick="go('home')">&#8592; <span id="lb-lbl">Back</span></div>
    <div class="lang-title" id="lt">Your Language</div>
    <div class="lang-sub-text" id="ls">All prayers will appear in your chosen language.</div>
  </div>
  <div class="scroll">
    <div class="lang-list" id="llist"></div>
  </div>
</div>

</div>

var PRAYERS={
victory:[
{t:“I pray that my team rises today with a victory that belongs to them. Let every boot that strikes that ball carry the weight of a thousand hours of sacrifice — and let it land exactly where it needs to.”,r:“Speak this slowly. Feel the weight of every training session your players poured out for this moment.”},
{t:“May the final whistle blow in our favour. I call it in now, before the first kick. Victory is not a surprise — it is a declaration made before the game began.”,r:“You are not wishing for victory. You are summoning what already belongs to your team.”},
{t:“I pray that every shot on target finds its way. That the goalkeeper’s hands are steady. That the defenders hold their line. That the striker trusts the instinct that says: now.”,r:“Pray position by position. Cover your whole team in this declaration.”},
{t:“Today I release every prayer held in silence for this team. I speak over their legs: do not tire. I speak over their minds: do not doubt. I speak over their hearts: you were made for exactly this.”,r:“Let this be a sending-off. You are dispatching them with your words.”},
{t:“Let the scoreboard at the end of this match tell a story people will repeat. Not just a win — but a statement. A match they will never forget.”,r:“Some victories are just results. Others become legends. Pray for the legendary kind.”},
{t:“I pray for goals. Not just the ones that go in — but the moments before them. The right pass. The right run. The movement that opens the space nobody else saw.”,r:“Football is a game of inches and instincts. Pray into the details.”},
{t:“May the spirit of this team be unbreakable today. Let no setback silence them. What was built in training does not crumble under pressure — it rises.”,r:“Resilience within a match is its own kind of victory. Declare it over them.”},
{t:“I pray that the referee sees clearly and judges fairly. That the best team — my team — wins on merit, on heart, and on will.”,r:“Pray over the context, not just the players. Every element of a match matters.”},
{t:“Let victory tonight belong to those who wanted it most, who bled for it in training, who carried their nation’s hope in their chest every day they showed up.”,r:“This is not blind support. This is a prayer rooted in what your players have genuinely sacrificed.”},
{t:“I declare that when that ball crosses the line, something shifts. Not just in the tournament — but in the nation. That people watching from far away will rise and feel they too have won something.”,r:“Goals do more than change scores. They lift nations. Declare that lift.”},
{t:“I pray that my team’s captain leads with calm. That in the moments of chaos they become the eye of the storm. The one the others look to and feel safe.”,r:“Leadership under pressure is a gift. Pray it over your captain specifically.”},
{t:“May the bench be as alive as the pitch. May every substitute who enters carry the same energy, the same hunger, the same sharpness. No drop in intensity.”,r:“Matches are often won by those who come on in the second half. Declare over them too.”},
{t:“I speak peace over the anxiety that comes before a big match. Let every player breathe deeply and know that they are ready. The preparation is done. Now they just have to play.”,r:“Pre-match nerves are real. This prayer covers the emotional state before a ball is even kicked.”},
{t:“May the opposition play their best — and may my team still win. I do not pray for the other side to fail. I pray for my team to rise so high that the gap cannot be closed.”,r:“Praying from abundance, not fear. You do not need the other team to fail. Yours just needs to soar.”},
{t:“I declare that every player on my team is exactly where they are supposed to be — on this pitch, in this tournament, in this moment. This is not an accident. This is their appointment.”,r:“Destiny is the deepest fuel. Pray that sense of appointment over every single player.”},
{t:“Let the supporters in the stadium and the millions watching at home feel something today. Not just sport — but something bigger. Let this team’s energy touch people who did not know they needed to be touched.”,r:“The greatest matches become cultural moments. Declare that this is one of them.”},
{t:“I pray that the tactics work. That what the coach drew up transfers perfectly onto the pitch. That when it bends, the players have the wisdom to adapt.”,r:“Tactics are intelligence. Pray over the mind of the coach and the discipline of the team.”},
{t:“For every player playing through pain today — a knock they have not told anyone about — I pray that their body holds. That adrenaline and purpose carry them through every minute.”,r:“Most players in a major tournament are playing through something. Declare endurance over their bodies.”},
{t:“Let this victory be the one that unlocks the next. A momentum that does not stop. A belief that grows with every match. Let today be the beginning, not the peak.”,r:“Pray beyond today’s match. Speak a tournament-defining run into existence.”},
{t:“When the final whistle comes and my team has won, I pray that the celebration is full. That the tears are real. That the joy is unconstrained. That they know — truly know — what they have done.”,r:“Pray for the moment of victory itself. It deserves to be fully felt.”}
],
courage:[
{t:“I pray that my team does not play it safe today. That they take risks smaller teams would not take. That they shoot when logic says to pass — and that it works.”,r:“Boldness is a choice. Pray it becomes their default setting.”},
{t:“May the fear of failure not enter that dressing room. Let every player walk through the tunnel knowing that even if things go wrong, they played without apology.”,r:“Freedom from fear of failure is one of the greatest competitive advantages.”},
{t:“I declare courage over the young players in this squad experiencing a major tournament for the first time. Let the stage not swallow them. Let it summon them.”,r:“Rookies in big moments need this prayer specifically.”},

{t:“Let courage be contagious in this team. Let one brave run, one brave tackle, one brave decision light a fire that spreads through the entire squad.”,r:“Courage is indeed contagious. Pray for the first spark.”},
{t:“I pray for the player who has been doubted. Who the pundits wrote off. Let their moment come today. Let courage meet opportunity.”,r:“There is always a doubted player in every squad. This prayer is for them.”},
{t:“May my team press high and press hard, even when the legs are tired. Even in the final ten minutes. Let courage overrule the body.”,r:“Late-game pressure from a tired team is one of the most courageous things in football.”},

{t:“Let bravery in possession be a hallmark of this team today. No panic clearance. Let them breathe on the ball and play with courage.”,r:“Technical bravery — keeping the ball under pressure — requires a particular kind of courage.”},
{t:“I pray that when the match reaches its hardest moment — and every great match has one — my team does not blink.”,r:“Pray specifically for that moment before it comes. Name it. Cover it.”},
{t:“May the spirit of every athlete who ever played for this nation flow through this squad today. Let the legacy of those before give the present generation something to stand on.”,r:“A nation’s football history is a resource. Pray that the team draws from it.”},
{t:“I declare that courage today is a choice my team makes together, not a feeling they are waiting to arrive. They do not need to feel brave to play brave. They choose it.”,r:“Courage is volitional, not accidental. Pray that your team knows the difference.”}
],
focus:[
{t:“I pray that every player on my team enters this match with a mind free from distraction. That the noise of the crowd and the pressure of expectation fall away — and only the match remains.”,r:“Mental clarity is the foundation of great performance.”},
{t:“May my team’s concentration not waver in the second half when legs are tired. Let the mind stay sharp even when the body is screaming.”,r:“Concentration fatigue is real. Declare sustained mental sharpness.”},
{t:“I pray for complete present-moment awareness. That no player is thinking about the last mistake or the missed chance. Only the next ball.”,r:“Football is played in the present tense. This prayer keeps the team there.”},
{t:“Let the game plan hold in their minds from the first minute to the last. Let every positional rotation and pressing trigger be recalled cleanly and executed without hesitation.”,r:“Mental discipline in executing a plan is underrated.”},
{t:“May my team’s midfielders read the game three seconds ahead of everyone else. Let them see the pass before the ball arrives, the run before the space opens.”,r:“Elite midfield play is almost prophetic in its anticipation.”},
{t:“I pray against mental errors today. Against the switched-off moment, the ball watched instead of tracked, the player left unmarked for a fraction too long.”,r:“Most goals conceded at the highest level start with a single mental lapse.”},
{t:“May the team’s set-piece concentration be absolute. Every corner delivered with intent. Every free-kick positioned to the exact coordinate drilled in training.”,r:“Set pieces decide a huge number of matches.”},
{t:“I declare that my team’s attention narrows to its sharpest point in the final minutes. The closer to the end, the more alive they become.”,r:“Late-game focus is a competitive advantage. Most teams drift. Declare that yours does not.”},
{t:“Let the goalkeeper’s eyes be precise today. Let them track the ball early, read the angles, and be exactly where they need to be — not reacting, but already there.”,r:“Goalkeeper positioning starts with focused tracking.”},
{t:“I pray that my team zones in during the warm-up. That by the time they line up in the tunnel, their minds are already on the pitch.”,r:“Pre-match preparation sets the mental tone.”},
{t:“May every player in this squad tune out the noise of a world with opinions. Let them hear only the voice of their teammates and the deep knowing inside themselves.”,r:“External noise is one of the biggest distractions for modern athletes.”},
{t:“I declare laser-sharp focus over the strikers in front of goal. No snatching. No overthinking. Just the pure trained response: see the opening, strike the ball.”,r:“Goal-scoring is ultimately a focused, automatic response.”},
{t:“Let the team’s communication be sharp and constant. Clear calls, early warnings, decisive instructions. Not a position on the pitch that does not know what is happening.”,r:“Communication is collective focus.”},
{t:“I pray that the coaching staff’s instructions at half time cut through with perfect clarity. That the second half begins with renewed sharpness.”,r:“The half-time reset is a critical mental moment.”},
{t:“May the captain’s focus be infectious. Let the team draw their concentration from their leader’s example — calm, clear, completely in the moment.”,r:“Captains set the emotional and mental register for a team.”},
{t:“I pray that my team is not rattled by time-wasting or gamesmanship. Let the opponent’s tactics of disruption fall on a team that cannot be disrupted.”,r:“Opponents will try to disturb focus. Pray a shield around your team’s concentration.”},
{t:“Let every training session that sharpened these players’ minds come flooding back in the right moment. Let muscle memory and mental memory work together perfectly.”,r:“Training is stored focus. Pray that it is fully retrieved when needed.”},
{t:“May the young players especially stay in the moment. Let the magnitude of the occasion become a reason to concentrate harder, not to freeze.”,r:“Young players in big matches often lose focus to awe. Pray that awe becomes concentration.”},
{t:“I pray that my team has one goal in their collective mind — to stay fully present, to play the next ball better than the last, and not let a single second go to waste.”,r:“Present-moment focus is a practice and a discipline.”},
{t:“Let the final ball into the box be struck with focus and precision. The cross practised ten thousand times. Let the focus of every training session arrive exactly here.”,r:“The goal-creating moment is the culmination of focused preparation.”}
],
comeback:[
{t:“If my team falls behind today, I pray they do not believe the scoreline. Let them believe only in what they are capable of. A goal behind is not a verdict — it is a starting point.”,r:“The moment after conceding is the most important moment in a match.”},
{t:“I declare that my team’s greatest performance in this tournament happens after their hardest setback. That what breaks others only clarifies this squad.”,r:“Some teams only discover what they are made of under pressure.”},
{t:“May the spirit of every great sporting comeback in history live in the bones of this team today. Let them know — in their bodies — that it is never over.”,r:“History is full of impossible comebacks. Pray that your team draws from it.”},
{t:“I pray for the player who made the mistake that let a goal in. Let shame not take root. Let them shake it off in seconds and play the next ten minutes as the best of their life.”,r:“Error recovery is one of the most important psychological skills in football.”},
{t:“Let my team play their best football when it is hardest. When going behind triggers not panic, not retreat, but the controlled fury of a team that knows what it is doing.”,r:”‘Controlled fury’ is the state great comeback teams reach.”},
{t:“I declare that no matter what the half-time score is, the second half belongs to my team. That they return to the pitch as a different team — sharper, hungrier, free.”,r:“The half-time rebirth is one of football’s most dramatic moments.”},
{t:“May the supporters in the stadium not go quiet when things get hard. Let their voice become a wall of sound that lifts my team from the floor.”,r:“The crowd is a resource in a comeback. Pray that they play their part.”},
{t:“I pray for the moment when one player decides — quietly, without announcement — that this team is coming back. That they make a run nobody else makes and turn the match.”,r:“Comebacks are usually started by one person’s decision.”},
{t:“Let my team resist the temptation to rush. Let them believe they have time. Let them play with pace but without desperation.”,r:“The discipline of a composed comeback is harder than urgency.”},
{t:“I pray for the substitute who comes on in the second half and changes the game. The fresh legs. The hungry eyes. Let them do it.”,r:“Some of the greatest comeback contributions come from the bench.”},
{t:“May this team’s story in this tournament be a comeback story. Because the greatest stories always have a moment where everything looks lost, and then it doesn’t.”,r:“Narrative matters in sport. Pray for a story worth telling.”},
{t:“I declare that when my team scores the equaliser, the momentum shifts completely and does not shift back. That the goal breaks something in the opponent and builds something in mine.”,r:“Some goals do more than equalise. They transfer psychological momentum.”},
{t:“Let my team draw on every hard moment in their history that brought them to this point. Every time they were told they were not good enough. Let it all become fuel.”,r:“Adversity is stored energy.”},
{t:“I pray against resignation. Against the moment when a player’s body language says we cannot do this. Let every player believe fully in the final second of the final minute.”,r:“Belief is the last thing to leave a great team.”},
{t:“May the coach’s words in a moment of crisis be exactly the right words. The kind that remind a group of players they have been through worse, and they are still here.”,r:“Leadership communication in adversity is an art.”},
{t:“I declare that comebacks are in this team’s DNA. That somewhere in their history, in their culture, in how they were raised — they learned how to rise.”,r:“Pray into the identity and culture of the nation as much as the team.”},
{t:“May every player who ever wore this shirt and fought through a hard moment send their energy to this team today.”,r:“Connect the current squad to their historical predecessors. Spiritual lineage is real.”},
{t:“I pray that the team scores first after conceding — and that the goal silences everyone who had already written them off.”,r:“A goal in response to adversity carries a particular energy.”},
{t:“Let the comeback be a teaching that travels further than the match itself. That young people watching learn what it looks like to refuse defeat.”,r:“Great sporting moments teach beyond sport.”},
{t:“When it is over and my team has come back to win, I pray the players know what they did. They did not just score goals. They chose, together, to refuse the story being written for them.”,r:“Help your team understand the deeper meaning of what a comeback represents.”}
],
unity:[
{t:“I pray that my team plays like one body today. That the eleven individuals on that pitch become a single organism — thinking together, moving together, breathing together.”,r:“The highest expression of team sport is genuine collective unity.”},
{t:“May there be no ego on that pitch today. No player playing for themselves. Let the team be the star.”,r:“Ego suppression for team benefit is one of the hardest things in sport.”},
{t:“I declare that the bond between these players goes deeper than the match. They have built something no opposition can fracture.”,r:“Team unity is built before the match. Pray that what was built holds firm.”},
{t:“May the substitutes on the bench be the loudest supporters in the stadium. Let there be no resentment toward those who are playing.”,r:“Bench unity is often the hidden factor in a team’s collective energy.”},
{t:“I pray that when one player is struggling, their teammates cover for them without hesitation and without judgment. That the team protects its own.”,r:“The protection of a struggling teammate is one of the most beautiful things in team sport.”},
{t:“Let the goalkeeper and defenders operate as a single unit. Let communication be instinctive. Let no gap open between them.”,r:“Defensive unity is the foundation of every successful team.”},
{t:“I pray for the partnerships across this team. Let their chemistry today be so natural it looks like they have played together for decades.”,r:“Football is built on specific partnerships. Pray over each of them.”},
{t:“May the team celebrate every goal as if every player scored it. May the joy be completely shared.”,r:“Shared celebration is a visible marker of genuine team unity.”},
{t:“I declare that language is no barrier in this squad. Players from different backgrounds are unified by the single language of football.”,r:“Modern squads are beautifully diverse. Pray that diversity becomes a strength.”},
{t:“Let the team’s defensive shape hold with the discipline of players who trust each other completely. Let unity be the defensive system.”,r:“Trust and unity are the invisible architecture of a solid defence.”},
{t:“I pray that the team eats together, travels together, and centres themselves together. Let the rituals of togetherness build a foundation opponents will feel.”,r:“Off-pitch unity translates to on-pitch cohesion.”},
{t:“May the veteran players and the young players find each other today. Let experience reach down and pull potential up.”,r:“The exchange between veterans and young players is one of the richest team dynamics.”},
{t:“I declare that this team goes into battle as a family. Families do not leave each other behind. They fight hardest when one of them is down.”,r:“The family metaphor for a team is ancient and true.”},
{t:“Let the team’s pressing be collective and synchronised. Let eleven players move as one unit with coordination that only comes from true unity.”,r:“Collective pressing requires complete mutual trust.”},
{t:“I pray for the captain to carry the team’s unity in their body language throughout. Let the players see in their leader that they are in this together.”,r:“Captains communicate unity non-verbally as much as with words.”},
{t:“May the team’s entire support network — coaches, physios, kit men — all feel the weight of what they have contributed. This is everyone’s win.”,r:“Team unity extends to the entire support structure.”},
{t:“I declare that what divides nations off the pitch has no authority over what unites this team on it.”,r:“Sport at its best transcends division.”},
{t:“May no moment of individual brilliance come at the cost of team structure. Let flair serve unity, not compete with it.”,r:“Individual brilliance and team unity can coexist. Pray that this team proves it.”},
{t:“I pray that the team finishes this match — whatever the result — with their arms around each other. Win or lose, the unity is the thing that holds.”,r:“Unity beyond results is the mark of a truly great team.”},
{t:“Let the anthem before this match be more than ceremony. Let every player feel the full weight of who they represent. Let unity arrive before the first ball is kicked.”,r:“The anthem is the first moment of collective identity.”}
],
strength:[
{t:“I pray that my team’s physical preparation carries them through every single minute. That the conditioning drilled into their bodies does not fail them when they need it most.”,r:“Physical strength is earned before the match. Pray that it shows up fully.”},
{t:“May the players carrying knocks and minor injuries be held together today. That pain does not become injury. That the body finds what it needs.”,r:“Most players in major tournaments are managing something physical. Cover them.”},
{t:“I declare physical dominance for my team in the air today. In every header, every aerial contest. Let them outjump and out-compete whoever opposes them.”,r:“Aerial dominance is physical, mental and brave. Declare it over the team.”},
{t:“Let my team win every first contact. Every fifty-fifty ball. Every shoulder-to-shoulder challenge. Let them be the team that arrives first and leaves last.”,r:“First contact in football is a battle of will as much as physicality.”},
{t:“I pray that my team’s pressing intensity does not drop for ninety minutes. That they are the more physical team — disciplined, not reckless.”,r:“Physical intensity maintained over ninety minutes is a form of supremacy.”},
{t:“May the striker hold up play with the strength of a wall today. Back to goal, shielding possession, winning fouls and creating time for the team to breathe.”,r:“Holding strength in a striker is a different gift from pace or technique.”},
{t:“I pray for full-backs who sprint the length of the pitch and still track back. Let their endurance be limitless. Let their lungs be larger than the match.”,r:“Full-back endurance is one of the most demanding physical requirements in modern football.”},
{t:“Let the team’s centre-backs be immovable today. Physical, dominant, unbeatable. Let the opposition’s striker feel from the first challenge that today is not their day.”,r:“Centreback dominance can define the entire psychological tone of a match.”},
{t:“I declare that my team’s physical peak arrives exactly in time for this match. Let the taper, the rest, and the preparation align perfectly.”,r:“Peaking at the right time in a tournament is a discipline and a gift.”},
{t:“May every sprint be won. Every recovery run completed. Every chase that looks impossible become possible through a refusal to let discomfort make the decision.”,r:“Recovery runs are often the most important sprints in a match.”},
{t:“I pray that my team’s physical strength is matched by physical intelligence. That they know when to use their body and when to absorb contact.”,r:“Smart physicality is a higher skill than raw strength.”},
{t:“Let the goalkeepers’ hands be strong and sure today. Not spilling what they should hold. Not fumbling under pressure.”,r:“Goalkeeper handling under physical pressure is its own distinct form of strength.”},
{t:“I pray that the team’s physical battles in the first fifteen minutes set the tone. That the opponent feels from the first ball they are in for a long, hard match.”,r:“Early physicality establishes psychological territory.”},
{t:“May my team’s physical preparation be a tribute to every coach, physio, and fitness trainer who worked with them. Let their collective effort carry the squad.”,r:“Physical readiness is the result of an entire ecosystem of support.”},
{t:“I declare endurance over the players who have played the most minutes. Let their bodies recover faster than the science says is possible.”,r:“Tournament fatigue accumulates. Pray for the highest-minute players.”},
{t:“Let my team never lose a match because of physical decline in the final twenty minutes. Let them be the fitter team at the end.”,r:“Late-game physical superiority is a competitive advantage.”},
{t:“I pray for protection against serious injury today. That every tackle is safe. That every player who starts finishes on their own two feet.”,r:“Safety is a form of prayer for strength — the strength that holds the body together.”},
{t:“May the team’s strength come not just from muscle but from will. The kind that shows up when the physical tank is empty and only something deeper can carry them.”,r:“The deepest strength is volitional, not physical.”},
{t:“I declare that the team’s physical presence sends an early message. That from the warm-up and the first touch, the opponent sees a team that came here ready.”,r:“Physical presence communicates before a ball is kicked.”},
{t:“When the final whistle blows and this team has given everything physically — I pray they feel the deep satisfaction of having held nothing back.”,r:“The feeling of complete physical expenditure in service of a team is one of sport’s most profound experiences.”}
],
legacy:[
{t:“I pray that this team plays with an awareness that what they do today will be talked about for years. That every decision is made by players who know they are writing something.”,r:“Legacy-consciousness does not create pressure — it creates elevation.”},
{t:“May the young people in this nation watching today see something in this team they carry into their own lives. Not just the goals — but the way they handled pressure.”,r:“Athletes model behaviour for millions. Pray over what is being modelled.”},
{t:“I declare that this tournament is a turning point in this nation’s football story. That the next generation inherits a different belief because of what this team does today.”,r:“Generational impact is the deepest form of legacy.”},
{t:“Let every legendary player who wore this shirt before be honoured by what this squad does today. Let the greats of the past feel that what they built has been carried forward.”,r:“Connecting present performance to past legends creates a powerful sense of belonging.”},
{t:“I pray that the captain’s performance today becomes the moment that defines them. Not just as a player — but as a symbol.”,r:“Captains in major tournaments often carry legacy-defining moments.”},
{t:“May the way this team loses, if they lose, become a legacy of its own. A loss so dignified the nation stands taller for it. A defeat that plants seeds for a future victory.”,r:“How a team loses matters to legacy as much as how they win.”},
{t:“I declare that the players in this squad become mentors and role models after this tournament. That the way they carried themselves here becomes the example for the next squad.”,r:“The transmission of legacy from one generation to the next is a spiritual act.”},
{t:“Let this team play in a way that makes people fall in love with their nation’s football. That neutrals watching become fans.”,r:“Legacy includes the expansion of a fanbase.”},
{t:“I pray for the stories that will be written after this match. Let them be stories worth writing. Let those who document this sport find something in today that deserves to last.”,r:“Documentation is how legacy is preserved.”},
{t:“May this team’s tournament run be the one a father tells his child about. The one a child watches a grainy replay of forty years from now and feels the electricity through the screen.”,r:“The matches that become folklore do something that defies explanation.”},
{t:“I declare that the sacrifices these players have made — time away from family, physical pain, years of discipline — find their full reward in what is built here.”,r:“Sacrifice deserves reward. Pray that the return matches the investment.”},
{t:“Let the coach’s legacy be shaped by this tournament. Not just wins and losses — but by the kind of human beings they helped these players become under pressure.”,r:“Coaching legacy is measured in character as much as trophies.”},
{t:“I pray for the player who steps onto this stage for the first time. Who years from now will tell their grandchildren: I was there. Let that memory be worth everything.”,r:“First major tournament experiences become lifelong identity markers.”},
{t:“May this tournament reveal something in this team they did not fully know was there. That the stage draws out a better version of them.”,r:“Tournaments can reveal latent greatness. Pray that this one does.”},
{t:“I declare that this nation’s football legacy grows today — regardless of the result. What is contributed to the sport and the culture is added to permanently.”,r:“Legacy is additive. Every match played with heart adds to what came before.”},
{t:“Let the match officials, the broadcasters, the administrators — everyone who makes this tournament happen — be part of a legacy they can be proud of.”,r:“Legacy is systemic, not just individual.”},
{t:“I pray that if trophies come, they are carried with humility. And if they do not come, that what was built here is not measured by whether a cup was lifted but by whether a people was moved.”,r:“Trophies are the most visible form of legacy but not always the most important one.”},
{t:“May the stories of this team travel beyond their own borders. Let football do what it does at its best — connect the world around something beautiful.”,r:“The greatest football stories transcend nationality.”},
{t:“I declare that this is a team history will remember. Not only for what they won — but for how they played, how they held together, how they represented their people.”,r:“Grace and fire together is the most powerful combination in sport.”},
{t:“Let the legacy of this match outlive every player in it. Let what was done today still mean something when the ones who did it are long gone.”,r:“True legacy transcends the lifetimes of those who create it.”}
],
nations:[
{t:“I pray for every nation represented in this tournament. That the spirit of fair competition and shared love of the game unites what politics and history so often divides.”,r:“The World Cup is one of the few places where the world genuinely gathers.”},
{t:“May the smaller nations in this tournament be lifted beyond what anyone expected. Let the minnows find something in themselves that shocks the world.”,r:“Underdog runs are the soul of tournament football. Pray for one.”},
{t:“I declare that this World Cup is a gift to the human race. That one ball, one pitch, and the universal language of football creates something rare: peace.”,r:“Sport’s power to create temporary peace is real and worth praying for.”},
{t:“Let the African nations in this tournament remind the world that football’s future is as much theirs as anyone’s. The talent and passion of this continent is without ceiling.”,r:“Africa’s football legacy is vast and growing.”},
{t:“I pray for every nation that has never won the World Cup. That this generation carries that longing as fuel, not as burden. And that one day — perhaps today — the wait ends.”,r:“National longing is one of the most powerful forces in sport.”},
{t:“May the host nation feel the full joy of welcoming the world. Let the atmosphere in the stadiums be something no player ever forgets.”,r:“Hosting a tournament is itself a form of service to the world.”},
{t:“I declare that every flag in those stadiums represents something sacred — a people, a history, a culture, a language, a dream. Let every nation be honoured.”,r:“Flags are compressed identity. Pray that this tournament honours the depth behind each one.”},
{t:“Let the South American nations play with the creativity, the street intelligence, and the joyful audacity that has always made their football something the world stands up to watch.”,r:“South American football carries a particular spirit.”},
{t:“I pray for the European nations — disciplined, tactical, relentless. Let their football be a masterclass in organisation. Let their best qualities surface when it matters most.”,r:“European football’s strengths are real and worth celebrating in prayer.”},
{t:“May the Asian nations play with a hunger that comes from knowing they have something to prove. Let this tournament mark a new chapter in Asian football’s standing in the world.”,r:“Asian football has grown enormously.”},
{t:“I pray for the players who left their home nations to earn a living in foreign leagues. Who carry one nation in their heart. Let home find them in this moment.”,r:“Diaspora athletes experience a particular form of belonging.”},
{t:“May the CONCACAF nations use the privilege of hosting to play with a freedom and joy that shows their own people what they are capable of.”,r:“Host nations carry unique pressure. Pray that it becomes freedom, not weight.”},
{t:“I declare that the nations of the world competing here are more alike than they know. The dreams of a young player in Lagos are the same as a young player in Lisbon.”,r:“Universal human longing is what football expresses.”},
{t:“Let the quality of competition, the fairness of officiating, and the spirit of the game be so high that no result feels stolen.”,r:“Fair competition is a prayer for the entire system.”},
{t:“I pray for the nations that did not qualify. Whose players watched from home while others walked out to the anthem. Let this tournament give them reason to believe their time is coming.”,r:“The nations outside the tournament are watching.”},
{t:“May the football of every nation tell its own story. That a team’s style carries the culture, the music, the rhythm of its people.”,r:“Footballing style as cultural expression is one of the sport’s most beautiful qualities.”},
{t:“I declare that this tournament plants seeds of development in nations that have never been. That a child watching today decides they will change that.”,r:“Football’s global reach is generational.”},
{t:“Let the commentary and storytelling around this tournament lift nations up rather than reduce them to stereotypes. Let the world be told the fuller, truer story of each nation.”,r:“Narrative power shapes perception.”},
{t:“I pray for the families of every player who sacrificed to put their child in a position to wear a national shirt. The mothers who washed the boots, the fathers who drove at dawn.”,r:“Behind every international player is a family story.”},
{t:“Let this World Cup end with the whole world feeling it was worth it. That the sport was elevated. That everyone who gave their hearts to this tournament found it was worth every sacrifice.”,r:“The closing prayer is for the whole tournament and everyone who gave themselves to it.”}
]

var lang=“en”,cat=null,idx=0;

function go(id){
document.querySelectorAll(”.screen”).forEach(function(s){s.classList.remove(“active”)});
document.getElementById(id).classList.add(“active”);
}

function drawHome(){
var t=L[lang],l=LANGS.find(function(x){return x.code===lang});
document.getElementById(“hflag”).innerHTML=l.flag;
document.getElementById(“hlang”).innerHTML=l.label;
document.getElementById(“blabel”).textContent=t.daily;
document.getElementById(“btext”).textContent=”\u201c”+(DAILY[lang]||DAILY.en)+”\u201d”;
document.getElementById(“sec-title”).textContent=t.choose;
document.documentElement.dir=lang===“ar”?“rtl”:“ltr”;
document.getElementById(“grid”).innerHTML=CATS.map(function(c){
return ‘<div class="card" onclick="openCat(\''+c.id+'\')">’+
‘<div class="card-glow" style="background:radial-gradient(circle,'+c.color+' 0%,transparent 70%)"></div>’+
‘<span class="card-icon">’+c.icon+’</span>’+
‘<div class="card-name">’+(c.n[lang]||c.n.en)+’</div>’+
‘<div class="card-sub">20 ‘+t.pr+’</div>’+
‘<div class="card-arrow">›</div>’+
‘</div>’;
}).join(””);
}

function drawLangs(){
var t=L[lang];
document.getElementById(“lt”).textContent=t.lt;
document.getElementById(“ls”).textContent=t.ls;
document.getElementById(“lb-lbl”).textContent=t.back;
document.getElementById(“llist”).innerHTML=LANGS.map(function(l){
return ‘<div class=“lang-row’+(l.code===lang?” sel”:””)+’” onclick=“setLang('’+l.code+’')”>’+
‘<div class="lang-flag">’+l.flag+’</div>’+
‘<div class="lang-info"><div class="lang-lbl">’+l.label+’</div><div class="lang-nat">’+l.native+’</div></div>’+
‘<div class="lang-tick">✓</div>’+
‘</div>’;
}).join(””);
}

function openCat(id){
cat=id; idx=0;
var c=CATS.find(function(x){return x.id===id});
document.getElementById(“pbg”).style.background=“radial-gradient(ellipse at 50% 0%,”+c.color+“18 0%,transparent 60%)”;
document.getElementById(“cat-label”).innerHTML=”<span>”+c.icon+”</span><span style='color:"+c.color+"'>”+(c.n[lang]||c.n.en)+”</span>”;
document.getElementById(“pfill”).style.background=c.color;
document.getElementById(“pdiv”).style.background=c.color;
document.getElementById(“next-btn”).style.background=c.color;
document.getElementById(“next-btn”).style.color=”#000”;
document.getElementById(“back-lbl”).textContent=L[lang].back;
drawPrayer();
go(“prayer”);
}

function getP(){return PRAYERS[cat]||[];}

function drawPrayer(dir){
var ps=getP(),card=document.getElementById(“pcard”);
if(dir){
card.classList.add(dir>0?“out-up”:“out-dn”);
setTimeout(function(){card.classList.remove(“out-up”,“out-dn”);setP(ps);},280);
} else {setP(ps);}
}

function setP(ps){
var p=ps[idx];
document.getElementById(“pn”).textContent=“Prayer “+String(idx+1).padStart(2,“0”);
document.getElementById(“pt”).textContent=”\u201c”+p.t+”\u201d”;
document.getElementById(“pr”).textContent=p.r;
document.getElementById(“pfill”).style.width=((idx+1)/ps.length*100)+”%”;
document.getElementById(“pnum”).textContent=(idx+1)+” / “+ps.length;
document.getElementById(“prev-btn”).disabled=idx===0;
document.getElementById(“next-btn”).disabled=idx===ps.length-1;
document.getElementById(“next-lbl”).textContent=idx<ps.length-1?(L[lang].next||“Next Prayer”):“Complete \u2713”;
}

function next(){var ps=getP();if(idx<ps.length-1){idx++;drawPrayer(1);}}
